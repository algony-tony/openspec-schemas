name: greenfield-bootstrap
version: 1
description: >
  Stand up a new full-stack project from a fuzzy idea to a verified,
  launch-ready MVP (DEFINE -> PLAN -> BUILD -> VERIFY -> REVIEW -> SHIP).
artifacts:
  - id: product-brief
    generates: product-brief.md
    description: Vision, target users, MVP scope, non-goals, and success metrics
    template: product-brief.md
    instruction: |
      Create the product brief — the shared answer to "what are we building and
      why, for whom, and how will we know it worked?"

      Before writing, surface your assumptions explicitly and invite correction
      (who the user is, why now, what success means, the binding constraint). Do
      not silently fill ambiguous requirements — that is the most dangerous form
      of misunderstanding.

      Fill every template section:
      - **Vision**: the real problem and the desired outcome. Start from the user
        experience and work back to technology.
      - **Target Users / Personas**: who has this problem and their context.
      - **MVP Scope**: the simplest version that still solves the real problem.
        Say no to almost everything (YAGNI); focus beats breadth.
      - **Non-Goals**: the explicit "not doing" list — what you deliberately
        exclude for now.
      - **Success Metrics**: measurable signals. Reframe vague asks ("make it
        fast") into concrete targets ("p95 < 200ms on 4G").
      - **Open Questions**: anything unresolved that needs a human decision.

      Keep it to one page. This brief anchors every later artifact; if scope or
      users are unclear, stop and ask rather than guess.

      **Clarifying before drafting (primary interview):** this artifact gathers
      broadly, so material unknowns are likely. List the unknowns that would
      change this artifact or a downstream decision; resolve what you can from any
      dependencies and the codebase. For the rest, ASK the user before writing the
      file — brainstorming-style: one question at a time, multiple-choice when you
      can, each with your recommended default. Skip trivial unknowns (use a
      sensible default). Record an item as deferred only if the user explicitly
      chose to defer it — never as a substitute for asking. If the user says "just
      draft it," proceed on explicit, listed assumptions.
    requires: []

  - id: constitution
    generates: constitution.md
    description: Project principles, three-tier boundaries, and tech stack; synced into openspec config
    template: constitution.md
    instruction: |
      Establish the project's constitution: the durable principles, boundaries,
      and tech stack that every future change inherits. This is the project's
      architectural DNA — stable, not per-feature.

      Fill every template section:
      - **Principles**: 5–10 numbered, durable engineering principles (e.g.
        "prefer boring technology", "every feature ships with tests and
        telemetry"). Express them in plain language specific to this project.
      - **Tech Stack**: languages, frameworks, and key dependencies with
        versions, each with a one-line rationale.
      - **Boundaries** (three tiers):
        - **Always**: non-negotiable practices (run tests before commit,
          parameterize queries, validate input at the boundary).
        - **Ask first**: changes needing human approval (new dependency, schema
          change, new auth flow, CORS or security-header changes).
        - **Never**: hard prohibitions (commit secrets, delete failing tests,
          edit vendored code).

      **Sync to OpenSpec config (required):** append a condensed version of the
      Principles and Boundaries into `openspec/config.yaml` under the top-level
      `context:` key, so OpenSpec injects them into every future change's
      instructions. Keep it short — it is injected into every artifact. Example:

      ```yaml
      context: |
        Constitution (summary):
        - Principles: <one line each>
        - Always: ... | Ask first: ... | Never: ...
      ```

      **Clarifying before drafting (primary interview):** this artifact gathers
      broadly, so material unknowns are likely. List the unknowns that would
      change this artifact or a downstream decision; resolve what you can from any
      dependencies and the codebase. For the rest, ASK the user before writing the
      file — brainstorming-style: one question at a time, multiple-choice when you
      can, each with your recommended default. Skip trivial unknowns (use a
      sensible default). Record an item as deferred only if the user explicitly
      chose to defer it — never as a substitute for asking. If the user says "just
      draft it," proceed on explicit, listed assumptions.
    requires:
      - product-brief

  - id: specs
    generates: "specs/**/*.md"
    description: Capability specs (ADDED requirements) in EARS form with acceptance scenarios
    template: spec.md
    instruction: |
      Define WHAT the system must do as capability specs, grounded in the product
      brief and constitution. Create one file per capability at
      `specs/<capability>/spec.md` (kebab-case capability names). For a greenfield
      project these are all new, so use the `## ADDED Requirements` header.

      Use the OpenSpec spec format (this is what `openspec archive` merges into
      `openspec/specs/`):
      - `### Requirement: <name>` written in EARS form — a trigger then a SHALL
        response (Ubiquitous "The system SHALL …"; Event-driven "WHEN <trigger>,
        the system SHALL …"; State-driven "WHILE <state>, …"; Conditional "IF
        <condition>, THEN …"). Use SHALL/MUST (avoid should/may).
      - Every requirement MUST have at least one `#### Scenario: <name>` with
        WHEN/THEN steps — each scenario is a test case. Scenarios MUST use
        exactly four hashtags.
      - Capture non-functional targets (performance, availability, security) as
        their own requirements linked to the architecture quality attributes, and
        state explicit out-of-scope.

      These specs are the source of truth: `openspec archive` merges them into
      `openspec/specs/`, giving later `feature` changes a baseline to delta
      against. They also feed the acceptance-and-review traceability table.

      **Clarifying before drafting (primary interview):** this artifact gathers
      broadly, so material unknowns are likely. List the unknowns that would
      change this artifact or a downstream decision; resolve what you can from any
      dependencies and the codebase. For the rest, ASK the user before writing the
      file — brainstorming-style: one question at a time, multiple-choice when you
      can, each with your recommended default. Skip trivial unknowns (use a
      sensible default). Record an item as deferred only if the user explicitly
      chose to defer it — never as a substitute for asking. If the user says "just
      draft it," proceed on explicit, listed assumptions.
    requires:
      - product-brief
      - constitution

  - id: architecture
    generates: architecture.md
    description: System context, component boundaries (C4), ADRs, runtime topology, quality attributes
    template: architecture.md
    instruction: |
      Explain HOW the system is structured and the decisions behind it.

      Fill every template section:
      - **Context (C4 L1)**: the system in its environment — actors and external
        systems it talks to.
      - **Containers / Components (C4 L2–L3)**: the major runtime units
        (services, apps, stores), their responsibilities, and the boundaries
        between them.
      - **Key Decisions (ADRs)**: record each significant choice as an ADR —
        Context, Decision, Consequences — plus the alternatives you considered
        and why you rejected them.
      - **Runtime Topology**: how it is deployed and how requests flow.
      - **Quality Attributes (-ilities)**: targets across the Well-Architected
        pillars (reliability, security, performance efficiency, operational
        excellence, cost). These bind the later -ility artifacts.

      Focus on structure and rationale, not line-by-line implementation. Respect
      the constitution's principles and tech stack.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - specs
      - constitution

  - id: api-contract
    generates: api-contract.md
    description: Contract-first interfaces, error model, versioning and deprecation
    template: api-contract.md
    instruction: |
      Design stable interfaces that are hard to misuse — REST/GraphQL endpoints,
      module boundaries, and any surface where one part talks to another.

      Fill every template section:
      - **Surfaces**: the external and internal interfaces in scope.
      - **Resource / Operation Model**: define the contract before implementing
        it (contract-first) — operations, request/response shapes, status codes.
      - **Error Model**: a consistent error shape and taxonomy; generic messages
        that don't leak internals.
      - **Versioning & Deprecation**: the versioning scheme and a deprecation
        policy planned at design time.

      Apply Hyrum's Law: every observable behavior becomes a de facto contract,
      so minimize what you expose and don't leak implementation details. Prefer
      extending over forking (one version at a time).

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: data-model
    generates: data-model.md
    description: Entities/ERD, storage, migrations and seed, data lifecycle
    template: data-model.md
    instruction: |
      Define the data the system owns and how it is stored and evolved.

      Fill every template section:
      - **Entities (ERD)**: entities, key attributes, and relationships.
      - **Storage**: the datastore choice with rationale (consistency, access
        patterns, scale), consistent with the architecture.
      - **Migrations & Seed**: a forward + rollback migration strategy and seed
        data for local/dev.
      - **Lifecycle & Retention**: data classification, retention windows, and
        deletion — coordinate sensitive-data handling with security-baseline.

      The data model informs the API shape; keep the two consistent.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: quality-strategy
    generates: quality-strategy.md
    description: Test pyramid, TDD discipline, testability seams, coverage gates
    template: quality-strategy.md
    instruction: |
      Define how the system is tested and kept testable — set the discipline
      before any code is written.

      Fill every template section:
      - **Test Pyramid**: what is covered by unit vs integration vs e2e vs
        contract tests, and roughly the proportions.
      - **TDD (default discipline)**: TDD is the default — write the failing test
        first, watch it fail, write the minimal code to pass, refactor. "If you
        didn't watch the test fail, you don't know it tests the right thing."
        List the only exceptions (throwaway prototypes, generated code, config),
        which require human sign-off.
      - **Testability Seams**: the dependency-injection points, interfaces, and
        fixtures that let units be tested in isolation.
      - **Coverage Gates & CI Stages**: coverage thresholds and which test levels
        run at which CI stage.

      This sets the bar that acceptance-and-review and tasks enforce.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: observability
    generates: observability.md
    description: On-call questions to signals (logs/metrics/traces), health, SLOs and alerts
    template: observability.md
    instruction: |
      Make the system diagnosable from the outside. Instrumentation is written
      alongside the feature, the same way tests are — never a post-launch add-on.

      Fill every template section:
      - **On-call Questions**: for each major feature, write the 2–4 questions an
        on-call engineer will ask ("what fraction of payments retry?"). If you
        can't name the questions, you're not ready to instrument.
      - **Signals**: pick the right signal per question — metric (how often / how
        fast, in aggregate), trace (where time went across services), log (why a
        specific case happened). Use structured logs: a stable event name plus
        machine-readable fields, not string interpolation.
      - **Health & Readiness**: health/readiness endpoints and dependency checks.
      - **SLOs & Alerts**: SLOs, error budgets, and alert rules tied back to the
        on-call questions.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: security-baseline
    generates: security-baseline.md
    description: Trust boundaries, STRIDE, OWASP controls, abuse cases, data classification
    template: security-baseline.md
    instruction: |
      Harden the system by design. Treat every external input as hostile, every
      secret as sacred, and every authorization check as mandatory.

      Threat-model first, then fill every template section:
      - **Trust Boundaries**: where untrusted data crosses in (HTTP, forms, file
        uploads, webhooks, third-party APIs, queues, and LLM output).
      - **Assets**: what is worth stealing or breaking (credentials, PII, payment
        data, admin actions, money movement).
      - **STRIDE Review**: run STRIDE over each boundary — Spoofing, Tampering,
        Repudiation, Information disclosure, Denial of service, Elevation of
        privilege — with a mitigation for each relevant threat.
      - **Always-Do Controls (OWASP)**: validate input at the boundary,
        parameterize queries, encode output, HTTPS everywhere, hash passwords
        (argon2/bcrypt/scrypt), set security headers, use httpOnly/secure/
        sameSite cookies, and audit dependencies.
      - **Abuse Cases**: for each feature, ask "how would I misuse this?" and make
        that the first test.
      - **Data Classification**: how PII/secrets are stored and handled.

      Most breaches begin in design (OWASP A04: Insecure Design), not in code.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: ux
    generates: ux.md
    description: User-facing experience — screens, components, tokens, accessibility; imports a prototype if provided
    template: ux.md
    instruction: |
      Design the user-facing experience. If the project has no UI (a backend
      service, CLI, or library), keep this thin: state "no UI, because …".

      **If a prototype is provided** (a directory, an unzipped archive, or an
      exported mockup — HTML, Figma export, screenshots): treat it as the source
      of truth. Read/extract it (unzip if needed), inventory its screens,
      components, states, and design tokens, and derive the spec from it — cite
      the prototype path. Do not redesign what the prototype already decided.
      **If no prototype**: design the UI from the specs and the product brief.

      Fill every template section:
      - **Source**: the prototype path (and format) or "from requirements".
      - **Screens & Flows**: pages and the flows between them.
      - **Component Inventory**: reusable components and their states
        (loading / empty / error / success).
      - **Design Tokens**: colors, typography, spacing, breakpoints.
      - **Accessibility**: keyboard, focus order, ARIA, WCAG contrast targets.
      - **Responsive / States**: breakpoint behavior and non-happy states.

      Stay framework-agnostic — describe the UX, not a specific component library.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: project-scaffold
    generates: project-scaffold.md
    description: Repo layout, tooling, 12-factor config, CI/CD, IaC, local dev
    template: project-scaffold.md
    instruction: |
      Define how the project is set up so anyone can build, run, and ship it.

      HARD RULES — self-check before you save:
      1. KEEP the template's section headings verbatim — especially
         `## Run & Entry`. Do NOT replace the template's sections with your own
         scheme (e.g. "Bootstrap Commands" / "Key Dependencies"). Fill the
         template; don't rewrite its structure.
      2. `## Run & Entry` MUST give ONE command that runs the whole app, the ONE
         entry URL a user opens, and how frontend & backend connect. If they are
         separate servers, name which URL is the app and ensure the backend root
         does NOT 404 for a user (backend serves the built SPA, a dev proxy, or a
         redirect). An API-only backend whose root 404s is not an acceptable entry.

      Fill every template section:
      - **Repo Layout**: the directory structure and what each part is
        responsible for (split by responsibility, not by technical layer).
        Include a `docs/` tree for durable project knowledge (architecture,
        ADRs, observability, security) that outlives any single change.
      - **Tooling**: linter, formatter, type checker, package manager, and the
        exact commands.
      - **Config & Environments (12-factor)**: configuration in the environment,
        not in code; how secrets are provided; per-environment config.
      - **CI/CD**: the pipeline stages and gates (build, test, lint/typecheck,
        security audit, deploy) — wire in the quality-strategy gates.
      - **Run & Entry**: define ONE command to run the whole app and the single
        entry URL a user opens, and resolve how frontend and backend connect
        (backend serves the built SPA, a dev proxy, or two servers — name which
        URL is the app). Do not leave an API-only backend whose root 404s as the
        de-facto entry.
      - **IaC & Local Dev**: an infrastructure-as-code baseline and exact local
        setup commands (clone -> install -> run in as few steps as possible).

      Self-check before saving: is there a `## Run & Entry` section with a single
      run command and a named entry URL whose root does not 404?

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture

  - id: acceptance-and-review
    generates: acceptance-and-review.md
    description: Acceptance criteria, Definition of Done, code-review checklist, requirements-to-code traceability
    template: acceptance-and-review.md
    instruction: |
      Set the bar for "done" and "correct" before any code is written, so
      verification is not improvised at the end.

      Fill every template section:
      - **Acceptance Criteria (per requirement)**: restate each requirement's
        testable criteria — this is the yardstick for whether the code matches
        the requirements. Include at least one **end-to-end, user-facing**
        criterion ("a user opens <entry URL> and can <core action> through the
        app"), whose evidence is a real run — not a unit/API test.
      - **Definition of Done**: the checklist that marks work complete (tests
        pass, telemetry added, docs updated, reviewed, traceability green).
      - **Code-Review Checklist**: what a reviewer must verify (correctness,
        boundaries respected, error handling, security controls, tests present).
      - **Requirements ↔ Code Traceability**: a table mapping every requirement
        to the tests/evidence that prove it. Every requirement gets a row.

      During apply, drift in this table (a requirement with no passing evidence,
      or behavior that contradicts a requirement) triggers the wide feedback
      loop: stop and amend requirements as a follow-up change.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - specs
      - quality-strategy

  - id: tasks
    generates: tasks.md
    description: TDD build checklist with explicit Verification and Review phases
    template: tasks.md
    instruction: |
      The apply phase parses this file's `- [ ] X.Y` checkboxes to track
      progress, so every actionable item MUST be a checkbox; untracked items are
      ignored.

      HARD RULES — a tasks.md that breaks these is not acceptable; self-check
      against them before you save:
      1. KEEP the template's structure: build phases first, then a
         `## Verification` heading, then a `## Review` heading — verbatim and in
         that order. NEVER rename, merge, drop, or replace `## Verification` /
         `## Review` with your own scheme (e.g. a trailing "tests" or "收尾" phase).
      2. One checkbox = one STEP (~2-5 min), NOT one per file:
         ✅ `- [ ] Write the failing test for price-difference` /
            `- [ ] Run it — watch it fail` / `- [ ] Minimal code to pass` /
            `- [ ] Run — confirm pass` / `- [ ] Commit`
         ❌ `- [ ] Create part.py (model + schema + crud)`
         Splitting "create file X with A, B, C" into its steps is mandatory. A
         real full-stack MVP is dozens of steps, not a dozen.
      3. Tests INTERLEAVE with code (TDD) — never batched into one trailing test
         phase. Every unit of behavior gets its own failing-test-first cycle,
         frontend included; a build phase with code but no adjacent tests is wrong.
      4. `## Verification` MUST include a checkbox that runs the app the way a user
         does (the project-scaffold run command), opens the entry URL, and confirms
         it serves a working page — NOT 404/blank — plus one core user flow
         end-to-end and an observability/security smoke. A green test suite alone
         is NOT sufficient.
      5. Every PLAN artifact must appear as ≥1 concrete task — api-contract (each
         endpoint), data-model (each entity/migration), quality-strategy (each test
         level), observability (each signal/health/SLO), security-baseline (each
         control + abuse-case test), ux (each screen/flow). Include a durability
         task that writes architecture + key ADRs, observability, and security into
         the repo `docs/` tree and commits them — on archive only delta specs merge
         into `openspec/specs/`, so `docs/` is what keeps this knowledge alive.

      Build the checklist: group work under `## N. <Phase>` headings ordered by
      dependency (independent phases run as parallel "waves"); `## Review` does a
      code review against the acceptance-and-review checklist and confirms the
      requirements-to-code traceability table is green. Reference the specs for
      what to build and architecture/api/data for how; each task must be verifiable.

      Self-check before saving — fix any miss, do not save until all pass: does the
      file contain `## Verification` (with the run-app/entry-URL line) and
      `## Review`? Is every checkbox a single ~2-5 min step, not a whole file? Are
      tests interleaved rather than batched? Does every PLAN artifact have a task,
      including the `docs/` durability task?

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - architecture
      - api-contract
      - data-model
      - quality-strategy
      - observability
      - security-baseline
      - ux
      - acceptance-and-review
      - project-scaffold

  - id: launch-readiness
    generates: launch-readiness.md
    description: Pre-launch checklist, rollback plan, runbook
    template: launch-readiness.md
    instruction: |
      Confirm the MVP is ready to go live. This is the final artifact; repeated
      production releases are out of scope (a future `release` schema).

      Fill every template section:
      - **Pre-Launch Checklist**: verify CI is green on main, observability is
        wired (dashboards/alerts live), security-baseline controls are in place,
        a rollback plan and runbook exist, and a staging smoke test has passed.
      - **Rollback Plan**: exactly how to revert a bad launch.
      - **Runbook**: the operational notes on-call needs (key dashboards, alerts,
        common failure modes, escalation).

      Do not mark launch-ready while any checklist item is unmet — evidence
      before the claim.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - observability
      - security-baseline
      - project-scaffold
      - acceptance-and-review

apply:
  requires:
    - tasks
    - launch-readiness
  tracks: tasks.md
  instruction: |
    Implement the project by working through tasks.md, then verify, review, and
    confirm launch readiness. This phase does not end when code is written.

    Loop:
    1. Take the next unchecked task. Follow TDD: write the failing test, watch it
       fail, write the minimal code to pass, refactor, commit. Mark the checkbox
       done only when its tests pass.
    2. Run the `## Verification` and `## Review` phases as gates. Never claim a
       task or the build "done" without showing the green evidence (test output,
       lint/typecheck/build results) — evidence before assertions. A green test
       suite is not proof the app works: the Verification phase must include
       actually running the app and confirming its entry URL serves (not 404).
       If `tasks.md` lacks a `## Verification` or `## Review` section, treat it as
       a generation defect and add the missing phase (including the run-app/
       entry-URL check) before continuing — the build is not done without it.
    3. Check conformance against acceptance-and-review: every requirement's
       acceptance criteria must have passing evidence in the traceability table.

    When something fails, choose the loop by radius:
    - **Tight loop** (implementation defect / failing test / review nit): debug
      methodically — reproduce, find the root cause, fix, re-verify — and stay in
      this phase. Do not patch symptoms.
    - **Wide loop** (a requirement is wrong, missing, or ambiguous — the work
      reveals spec/implementation drift): stop, surface it, and amend the
      requirements/specs as a follow-up change. Never silently work around a spec
      gap.

    Browser verification (tool-agnostic): when UI acceptance needs a browser, use
    a browser automation tool (e.g. Playwright, chrome-devtools-mcp, or gstack
    `browse`). Prompt the human to install and run it, and proceed only after
    explicit consent — nothing is bundled.

    Track progress by checking the existing `- [ ]` boxes in `tasks.md` in
    place — keep exactly one task list; never rewrite, regenerate, or append
    a second copy of it.

    Stop and ask the human on any blocker rather than guessing. Finish by
    confirming launch-readiness: do not declare launch-ready while any checklist
    item is unmet.
