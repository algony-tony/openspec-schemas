name: feature
version: 1
description: >
  Add a capability to an existing system. Concern artifacts (api, data,
  observability, security) are deltas to the current baseline; project-level
  context (constitution, quality strategy) is inherited from openspec config.
artifacts:
  - id: proposal
    generates: proposal.md
    description: Why, what changes, scope, affected capabilities and code, impact
    template: proposal.md
    instruction: |
      Establish WHY this feature is needed and WHAT it changes in the existing
      system. Read the relevant existing specs (openspec/specs/) and code first
      so the proposal builds on reality, not assumptions.

      Fill every template section:
      - **Why**: the problem/opportunity in 1–2 sentences. Why now?
      - **What Changes**: new / modified / removed behavior. Mark **BREAKING**.
      - **Scope**: in-scope and explicit out-of-scope.
      - **Affected Capabilities & Code**: which existing capabilities (spec
        folders) and code areas this touches — this drives the spec deltas.
      - **Impact**: users, APIs, data, dependencies, operational impact.

      **Clarifying before drafting (primary interview):** this artifact gathers
      broadly, so material unknowns are likely. List the unknowns that would
      change this artifact or a downstream decision; resolve what you can from any
      dependencies and the codebase. For the rest, ASK the user before writing the
      file — brainstorming-style: one question at a time, multiple-choice when you
      can, each with your recommended default. Skip trivial unknowns (use a
      sensible default). Record an item as deferred only if the user explicitly
      chose to defer it — never as a substitute for asking. If the user says "just
      draft it," proceed on explicit, listed assumptions.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Spec deltas (ADDED/MODIFIED/REMOVED) in EARS form with acceptance scenarios
    template: spec.md
    instruction: |
      Define WHAT changes as spec deltas against the existing capabilities named
      in the proposal. Create one file per affected capability at
      `specs/<capability>/spec.md` (use the existing folder name).

      Delta operations (use `##` headers):
      - **ADDED Requirements**: new behavior.
      - **MODIFIED Requirements**: copy the ENTIRE existing requirement block from
        openspec/specs/<capability>/spec.md, then edit it (partial content loses
        detail at archive time).
      - **REMOVED Requirements**: include **Reason** and **Migration**.

      Format:
      - `### Requirement: <name>` in EARS form (WHEN/IF/WHILE … the system SHALL …;
        use SHALL/MUST, avoid should/may).
      - Every requirement has at least one `#### Scenario:` with WHEN/THEN — each
        scenario is a test case. Scenarios MUST use exactly four hashtags.

      **Clarifying before drafting (primary interview):** this artifact gathers
      broadly, so material unknowns are likely. List the unknowns that would
      change this artifact or a downstream decision; resolve what you can from any
      dependencies and the codebase. For the rest, ASK the user before writing the
      file — brainstorming-style: one question at a time, multiple-choice when you
      can, each with your recommended default. Skip trivial unknowns (use a
      sensible default). Record an item as deferred only if the user explicitly
      chose to defer it — never as a substitute for asking. If the user says "just
      draft it," proceed on explicit, listed assumptions.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Approach, key decisions/ADRs, architecture impact, rollout/flag
    template: design.md
    instruction: |
      Explain HOW the feature is implemented within the existing architecture.

      Fill every template section:
      - **Approach**: how it fits the current design and conventions (inherited
        from the project constitution).
      - **Key Decisions**: significant choices as ADRs (Context / Decision /
        Consequences / Alternatives). Skip if the feature is mechanical.
      - **Architecture Impact**: new or changed components/boundaries — or
        explicitly "no architectural change".
      - **Rollout**: feature flag, migration ordering, gradual rollout, and
        backward compatibility.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - proposal
      - specs

  - id: api-contract
    generates: api-contract.md
    description: API delta — changed surfaces, contract, error model, compatibility
    template: api-contract.md
    instruction: |
      Describe this feature's change to the API surface as a delta. If the
      feature touches no interface, state "no API change" with a one-line reason
      and keep this thin.

      When there is a change, fill every template section:
      - **Changed Surfaces**: the new/changed endpoints or operations.
      - **Contract**: request/response shapes and status codes (contract-first).
      - **Error Model**: new or changed error cases; don't leak internals.
      - **Versioning & Compatibility**: keep existing consumers working (Hyrum's
        Law); prefer extending over breaking; define deprecation if needed.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - design

  - id: data-model
    generates: data-model.md
    description: Data delta — changed entities, migration, lifecycle
    template: data-model.md
    instruction: |
      Describe this feature's change to the data model as a delta. If the feature
      touches no data, state "no data change" with a one-line reason and keep it
      thin.

      When there is a change, fill every template section:
      - **Changed Entities**: new/changed entities, fields, relationships.
      - **Migration**: forward + rollback migration and any backfill.
      - **Lifecycle & Retention**: classification/retention for new data;
        coordinate sensitive data with security-baseline.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - design

  - id: observability
    generates: observability.md
    description: Observability delta — on-call questions, new signals, alerts/SLOs
    template: observability.md
    instruction: |
      Describe the telemetry this feature adds so it is diagnosable in production.
      A user-facing feature almost always needs at least one new signal; only
      state "covered by existing signals" when that is genuinely true.

      Fill every template section:
      - **On-call Questions**: 1–3 questions on-call will ask about this feature.
      - **New Signals**: the logs/metrics/traces that answer them (structured
        logs: stable event name + fields).
      - **Alerts / SLO Impact**: new or changed alerts/SLOs.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - design

  - id: security-baseline
    generates: security-baseline.md
    description: Security delta — new surface STRIDE, controls, abuse cases
    template: security-baseline.md
    instruction: |
      Threat-model the new attack surface this feature introduces. If it adds no
      new surface, state "no new surface" with a one-line reason and keep it thin.

      When there is new surface, fill every template section:
      - **New / Changed Trust Boundaries**: where new untrusted input enters.
      - **STRIDE (new surface)**: threats + mitigations for that boundary.
      - **Controls**: auth, validation, secrets, and data handling for the change
        (OWASP always-do controls still apply).
      - **Abuse Cases**: how it could be misused → make those the first tests.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - design

  - id: ux
    generates: ux.md
    description: UX/frontend delta for the feature; imports a prototype if provided
    template: ux.md
    instruction: |
      Describe this feature's change to the user-facing experience. If the
      feature touches no UI, state "no UI change, because …" and keep it thin.

      **If a prototype is provided** (a directory, an unzipped archive, or an
      exported mockup): treat it as the source of truth for the new/changed
      screens. Read/extract it (unzip if needed), inventory the changed screens,
      components, states, and tokens, and derive the delta from it — cite the
      prototype path. **If no prototype**: design the UI delta from the spec
      delta and the existing UI conventions.

      When there is a change, fill every template section:
      - **Source**: the prototype path (and format) or "from requirements".
      - **Changed Screens & Flows**: new/changed screens and flows.
      - **Component Changes**: new/changed components and their states.
      - **Accessibility**: keyboard, focus, ARIA, contrast for the new UI.

      Stay framework-agnostic. Follow the existing design system/conventions.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - design

  - id: acceptance-and-review
    generates: acceptance-and-review.md
    description: Acceptance criteria, Definition of Done, review checklist, traceability
    template: acceptance-and-review.md
    instruction: |
      Set the bar for "done" and "correct" for this feature before coding.

      Fill every template section:
      - **Acceptance Criteria (per requirement)**: restate each spec requirement's
        testable criteria — the yardstick for conformance. Include at least one
        **end-to-end, user-facing** criterion ("a user opens <entry> and can
        <core action>"), whose evidence is a real run — not a unit/API test.
      - **Definition of Done**: tests pass, telemetry added, docs updated,
        reviewed, traceability green.
      - **Code-Review Checklist**: correctness, boundaries respected, error
        handling, security controls, tests present.
      - **Requirements ↔ Code Traceability**: a row per requirement mapping it to
        the tests/evidence that prove it.

      During apply, drift in this table triggers the wide feedback loop: stop and
      amend the spec delta as a follow-up change.

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - specs

  - id: tasks
    generates: tasks.md
    description: TDD build checklist with explicit Verification and Review phases
    template: tasks.md
    instruction: |
      Break the feature into a trackable checklist. Every actionable item MUST be
      a `- [ ] X.Y` checkbox; apply parses these to track progress.

      Structure:
      - Group build work under `## N. <Phase>` headings, ordered by dependency.
      - Expand each build task into TDD steps: write the failing test -> run it
        and watch it fail -> write minimal code to pass -> run and confirm pass ->
        commit. Each task ends with an independently testable deliverable.
      - End with two explicit phases: `## Verification` (affected/full suite,
        lint, typecheck, build; then RUN THE APP and confirm the feature's entry
        URL/flow works end-to-end — not 404/blank; a green suite is not enough;
        plus an observability/security smoke) and `## Review` (code review
        against acceptance-and-review + traceability green).

      **Clarifying before drafting:** read the dependency artifacts and the
      codebase first and reuse their answers. Then list the *material* unknowns —
      those that would change this artifact or a downstream decision. If any
      remain, ASK the user before writing the file — brainstorming-style: one
      question at a time, multiple-choice when you can, each with your recommended
      default. Skip trivial unknowns (use a sensible default); record an item as
      deferred only if the user explicitly chose to defer it. If the user says
      "just draft it," proceed on explicit, listed assumptions.
    requires:
      - design
      - api-contract
      - data-model
      - observability
      - security-baseline
      - ux
      - acceptance-and-review

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Implement the feature by working through tasks.md, then verify and review.
    This phase does not end when code is written.

    Loop:
    1. Take the next unchecked task. Follow TDD: write the failing test, watch it
       fail, write minimal code to pass, refactor, commit. Mark the checkbox done
       only when its tests pass.
    2. Run the `## Verification` and `## Review` phases as gates. Never claim a
       task or the feature "done" without showing the green evidence — evidence
       before assertions. A green test suite is not proof the feature works:
       Verification must include actually running the app and confirming the
       feature's entry URL/flow works end-to-end (not 404).
    3. Check conformance against acceptance-and-review: every requirement's
       acceptance criteria must have passing evidence in the traceability table.

    When something fails, choose the loop by radius:
    - **Tight loop** (implementation defect / failing test / review nit): debug
      methodically — reproduce, root cause, fix, re-verify — and stay in this
      phase. Do not patch symptoms.
    - **Wide loop** (a requirement is wrong, missing, or ambiguous): stop, surface
      it, and amend the spec delta as a follow-up change. Never silently work
      around a spec gap.

    Browser verification (tool-agnostic): when UI acceptance needs a browser, use
    a browser automation tool (e.g. Playwright, chrome-devtools-mcp, or gstack
    `browse`). Prompt the human to install and run it, and proceed only after
    explicit consent — nothing is bundled.

    Track progress by checking the existing `- [ ]` boxes in `tasks.md` in
    place — keep exactly one task list; never rewrite, regenerate, or append
    a second copy of it.

    Stop and ask the human on any blocker rather than guessing.
